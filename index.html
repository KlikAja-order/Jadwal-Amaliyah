<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jadwal Amaliyah NU</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Noto+Naskh+Arabic:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root {
    --nu-green: #045d40;
    --nu-green-dark: #034630;
    --nu-gold: #d4af37;
    --pure-white: #ffffff;
    --soft-gray: #f8f9fa;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Montserrat', sans-serif;
    background: #e9ecef;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:15px;
}

#capture-area {
    width:100%;
    max-width:500px;
    background:#fff;
    position:relative;
    padding-bottom:25px;
    border:8px solid var(--nu-green);
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

#capture-area::before {
    content:"";
    position:absolute;
    top:2px; left:2px; right:2px; bottom:2px;
    border:3px solid var(--nu-gold);
}

.header-box {
    background:var(--nu-green);
    color:#fff;
    padding:15px 10px;
    text-align:center;
}

.nu-logo-text {
    font-family:'Noto Naskh Arabic';
    font-size:1.3rem;
    color:var(--nu-gold);
}

.title-main {
    font-size:1.6rem;
    font-weight:800;
}

.hijri-strip {
    background:var(--nu-gold);
    color:var(--nu-green-dark);
    font-size:0.7rem;
    padding:3px 12px;
    border-radius:20px;
    margin-top:5px;
    display:inline-block;
}

.sub-header {
    font-size:0.8rem;
    margin-top:10px;
}

.quotes {
    font-style:italic;
    font-size:0.75rem;
    padding:12px;
    text-align:center;
    line-height:1.5;
}

.table-header, .table-row {
    display:grid;
    grid-template-columns:1.6fr 1.6fr 1.6fr;
    text-align:center;
}

.table-header {
    background:var(--nu-green);
    color:#fff;
    font-size:0.7rem;
    padding:8px;
}

.table-row {
    background:var(--soft-gray);
    padding:12px 6px;
    font-size:0.75rem;
    line-height:1.4;
    transition:all 0.3s ease;
}

.table-row:hover {
    background:#e2e6ea;
}

.delete-btn {
    position:absolute;
    right:5px;
    top:50%;
    transform:translateY(-50%);
    background:#ff4757;
    color:#fff;
    border:none;
    border-radius:5px;
    padding:4px 7px;
    font-size:10px;
    cursor:pointer;
}

.footer-info {
    text-align:center;
    font-size:0.7rem;
    margin-top:10px;
}

.watermark {
    text-align:center;
    font-size:0.6rem;
    opacity:0.6;
    margin-top:5px;
}

.admin-panel {
    width:100%;
    max-width:500px;
    background:#fff;
    padding:20px;
    margin-top:15px;
    border-radius:8px;
}

input, select {
    width:100%;
    padding:10px;
    margin-bottom:10px;
}

.btn {
    width:100%;
    padding:12px;
    border:none;
    margin-bottom:8px;
    font-weight:700;
    cursor:pointer;
}

.btn-save { background:var(--nu-green); color:#fff; }
.btn-dl { background:var(--nu-gold); }
.btn-clear { background:#ff4757; color:#fff; }

</style>
</head>

<body>

<div id="capture-area">
    <div class="header-box">
        <div class="nu-logo-text">النَّهْضِيَّة</div>
        <div class="title-main">Jadwal Amaliyah</div>
        <div class="hijri-strip" id="hijri-display"></div>
        <div class="sub-header" id="auto-header"></div>
    </div>

    <p class="quotes">"Menjaga tradisi dan syiar amaliyah Ahlus Sunnah Wal Jamaah An-Nahdliyyah"</p>

    <div class="table-header">
        <div>Hari & Tanggal</div>
        <div>Waktu</div>
        <div>Acara</div>
    </div>

    <div id="list-container"></div>

    <div class="footer-info">Jama'ah Amaliyah</div>
    <div class="watermark">Generated by Amaliyah App</div>
</div>

<div class="admin-panel">
<input type="text" id="f-hijri" placeholder="Hijriyah">

<input type="date" id="f-date">

<select id="f-time-select" onchange="toggleManual()">
<option>Ba'da Dzuhur</option>
<option>Ba'da Ashar</option>
<option>Ba'da Magrib</option>
<option>Ba'da Isya'</option>
<option value="MANUAL">Manual</option>
</select>

<input type="text" id="f-time-manual" placeholder="19:30 WIB" style="display:none;">

<input type="text" id="f-event" placeholder="Nama kegiatan">

<button class="btn btn-save" onclick="saveData()">SIMPAN</button>
<button class="btn btn-dl" onclick="download()">DOWNLOAD</button>
<button class="btn btn-clear" onclick="clearAll()">HAPUS</button>
</div>

<script>
let schedule = JSON.parse(localStorage.getItem('data')) || [];

function toggleManual(){
    document.getElementById('f-time-manual').style.display =
    document.getElementById('f-time-select').value === 'MANUAL' ? 'block':'none';
}

function parseTime(t){
    if(t.includes(':')) return t;
    return t;
}

function render(){
    let c = document.getElementById('list-container');
    c.innerHTML='';

    schedule.sort((a,b)=> new Date(a.date)-new Date(b.date));

    schedule.forEach((i,x)=>{
        c.innerHTML+=`
        <div class="table-row">
        <button class="delete-btn" onclick="remove(${x})">x</button>
        <div>${new Date(i.date).toLocaleDateString('id-ID')}</div>
        <div>${i.time}</div>
        <div>${i.event}</div>
        </div>`;
    });
}

function saveData(){
    let d = f-date.value;
    let t = f-time-select.value==='MANUAL'?f-time-manual.value:f-time-select.value;
    let e = f-event.value;

    if(!d||!e) return alert("Lengkapi data!");

    schedule.push({date:d,time:t,event:e});
    localStorage.setItem('data',JSON.stringify(schedule));

    alert("✅ Berhasil disimpan");

    f-date.value='';
    f-event.value='';
    f-time-manual.value='';

    render();
}

function remove(i){
    schedule.splice(i,1);
    localStorage.setItem('data',JSON.stringify(schedule));
    render();
}

function clearAll(){
    if(confirm("Hapus semua?")){
        schedule=[];
        localStorage.setItem('data',JSON.stringify(schedule));
        render();
    }
}

async function download(){
    await document.fonts.ready;

    html2canvas(document.getElementById('capture-area'),{
        scale:5,
        backgroundColor:"#ffffff"
    }).then(c=>{
        let a=document.createElement('a');
        a.download="jadwal.jpg";
        a.href=c.toDataURL("image/jpeg",1);
        a.click();
    });
}

render();
</script>

</body>
</html>
